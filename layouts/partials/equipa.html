<section style="margin-top: -78px; padding: 50px 0; background-color: #f9f9f9;">
    <div class="container">
        <h2 style="text-align: left; margin-bottom: 30px; font-weight: bold; font-size: 2em;">Our Team</h2>
        
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; max-width: 1200px; margin: auto;">
            
            {{ range (where .Site.RegularPages "Section" "equipa") }}
            <a href="{{ .Permalink }}" style="text-decoration: none; color: inherit; flex: 0 1 calc(33.33% - 30px); min-width: 250px;">
                
                <div class="equipa-card" style="background: white; padding: 25px 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; transition: all 0.4s ease; position: relative; overflow: hidden; height: 100%;">
                    
                    <img src="{{ .Params.image }}" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 3px solid #007bff; transition: 0.4s;">
                    
                    <h3 style="margin: 10px 0 2px 0; font-size: 1.4em;">{{ .Title }}</h3>
                    
                    {{ if .Params.duration }}
                    <p style="color: #777; font-size: 0.85em; font-style: italic; margin: 0 0 10px 0;">
                        {{ .Params.duration }}
                    </p>
                    {{ end }}
                    
                    <p style="color: #007bff; font-weight: bold; font-size: 0.9em; margin-bottom: 0;">{{ .Params.description }}</p>
                    
                    <div class="overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.4s;">
                        <span style="color: white; font-weight: bold; font-size: 1.1em; border: 2px solid white; padding: 10px 20px; border-radius: 30px;">Read more...</span>
                    </div>
                </div>
            </a>
            {{ end }}

        </div>
    </div>
</section>

<style>
  /* Efeito de aumentar o cartão e mostrar o fundo escuro */
  .equipa-card:hover {
    transform: translateY(-10px) scale(1.02); /* Sobe e aumenta um pouco */
    box-shadow: 0 12px 24px rgba(0,0,0,0.15) !important;
  }

  .equipa-card:hover .overlay {
    opacity: 1 !important; /* Mostra o "Saber mais..." */
  }

  .equipa-card:hover img {
    transform: scale(0.9); /* A imagem diminui ligeiramente para dar estilo */
    border-color: white !important;
  }

  @media (max-width: 768px) {
  .equipa-card-wrapper { /* Se adicionares esta classe ao <a> */
    flex: 0 1 100% !important;
  }
  /* Ou simplesmente: */
  a[href*="/equipa/"] {
    flex: 0 1 100% !important;
  }
}
</style>
