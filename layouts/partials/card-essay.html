<div style="background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee; overflow: hidden; display: flex; flex-direction: column; height: 100%;">
    <div style="padding: 25px; flex-grow: 1;">
        <h3 style="font-weight: bold; color: #2c3e50; margin-bottom: 15px; font-size: 1.4em;">
            {{ if .Title }}{{ .Title }}{{ else }}Post sem Título{{ end }}
        </h3>
        
        <p style="font-size: 0.85em; color: #95a5a6; margin-bottom: 15px;">
            {{ .Date.Format "02 January 2006" }}
        </p>

        <a href="{{ .Permalink }}" style="color: #007bff; font-weight: bold; text-decoration: none;">
            Ler mais →
        </a>
    </div>

    <div style="height: 200px; background: #f8f9fa; border-top: 1px solid #eee;">
        {{ if .Params.image }}
            <img src="{{ .Params.image }}" style="width: 100%; height: 100%; object-fit: cover;">
        {{ else }}
            <div style="height: 100%; display: flex; align-items: center; justify-content: center; color: #bdc3c7;">Sem imagem</div>
        {{ end }}
    </div>
</div>
